name: Build and Publish Docker Image

on:
    push:
        branches:
            - main
        tags:
            - 'php*'
    workflow_dispatch:

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: digitalblake/core-wp-wordpress
                  tags: |
                      # Tag push: php8.4-1.2.3 → publish that exact tag + php8.4-latest
                      type=match,pattern=php(\d+\.\d+)-(.+),group=0
                      type=match,pattern=php(\d+\.\d+)-(.+),suffix=-latest,group=1,prefix=php
                      # main branch push → latest
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64,linux/arm64

            # Scan the actual built image (post apk-upgrade) and send a snapshot
            # to Snyk. This reads the real layers, so it reflects what ships —
            # unlike the GitHub Dockerfile project, which only sees the base
            # image's pre-upgrade CVEs. monitor never fails the publish.
            - name: Snyk monitor the published image
              uses: snyk/actions/docker@master
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  image: digitalblake/core-wp-wordpress:php8.4-latest
                  args: --file=Dockerfile --project-name=core-wp-wordpress-image
                  command: monitor
